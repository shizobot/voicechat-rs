<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceChat</title>
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#181b23;--bg3:#1f2330;--bg4:#262b38;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e4e6f0;--text2:#7e8499;--text3:#4e5369;
  --accent:#5b6af0;--accent2:#4a58d4;
  --green:#3ecf8e;--red:#e05555;
}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}

/* LOBBY */
#lobby{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.lobby-box{width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:1.75rem}
.logo-mark{width:52px;height:52px;border-radius:14px;background:var(--accent);display:inline-flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:.65rem}
.logo h1{font-size:1.5rem;font-weight:700;letter-spacing:-.5px}
.logo h1 span{color:var(--accent)}
.logo p{color:var(--text2);font-size:.82rem;margin-top:.2rem}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.4rem}
label{display:block;font-size:.72rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.3rem}
input[type=text]{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:.6rem .85rem;color:var(--text);font-size:.9rem;outline:none;transition:border-color .15s;margin-bottom:.9rem}
input[type=text]:focus{border-color:var(--accent)}
input[type=text]::placeholder{color:var(--text3)}
.btn-primary{width:100%;padding:.7rem;border:none;border-radius:9px;background:var(--accent);color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;transition:background .15s,transform .1s}
.btn-primary:hover{background:var(--accent2)}
.btn-primary:active{transform:scale(.98)}
.divider{display:flex;align-items:center;gap:.5rem;margin:1rem 0;color:var(--text3);font-size:.72rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.room-list{display:flex;flex-direction:column;gap:.35rem;min-height:36px}
.room-pill{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.45rem .8rem;cursor:pointer;display:flex;align-items:center;gap:.45rem;font-size:.85rem;transition:border-color .15s}
.room-pill:hover{border-color:var(--accent)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.err{color:var(--red);font-size:.78rem;margin-top:.35rem;display:none}
.hint{color:var(--text3);font-size:.78rem;text-align:center}

/* APP */
#app{display:none;height:100vh;flex-direction:column}
.topbar{display:flex;align-items:center;gap:.65rem;background:var(--bg2);border-bottom:1px solid var(--border);padding:.55rem .9rem;flex-shrink:0}
.tb-room{font-weight:600;font-size:.9rem}.tb-room span{color:var(--accent)}
.tb-members{display:flex;align-items:center;gap:.3rem;font-size:.75rem;color:var(--text2)}
.tb-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tb-actions{margin-left:auto;display:flex;gap:.4rem}
.tb-btn{background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:.75rem;padding:.3rem .65rem;cursor:pointer;transition:border-color .15s,color .15s}
.tb-btn:hover{border-color:var(--border2);color:var(--text)}
.main{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-head{padding:.7rem .9rem .4rem;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.participants{flex:1;overflow-y:auto;padding:.2rem .45rem .4rem}
.participant{display:flex;align-items:center;gap:.55rem;padding:.4rem .45rem;border-radius:7px}
.p-avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;position:relative;transition:box-shadow .2s}
.p-avatar.speaking{box-shadow:0 0 0 2.5px var(--green)}
.p-mic{position:absolute;bottom:-2px;right:-2px;width:13px;height:13px;border-radius:50%;border:2px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-size:6px}
.p-mic.on{background:var(--green)}.p-mic.off{background:var(--red)}
.p-name{font-size:.82rem;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-you{font-size:.68rem;color:var(--text3)}
.controls{border-top:1px solid var(--border);padding:.65rem .45rem}
.ctrl-row{display:flex;gap:.35rem;margin-bottom:.4rem}
.ctrl-btn{flex:1;height:36px;border:none;border-radius:7px;font-size:.95rem;cursor:pointer;transition:background .15s,transform .1s;display:flex;align-items:center;justify-content:center}
.ctrl-btn:active{transform:scale(.93)}
#btn-mic{background:var(--bg3);color:var(--text)}
#btn-mic.muted{background:var(--red);color:#fff}
#btn-leave{background:var(--red);color:#fff;flex:none;width:36px}
.vol-row{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--text2);padding:0 .2rem}
input[type=range]{flex:1;accent-color:var(--accent);background:transparent;border:none;outline:none;cursor:pointer}

/* CHAT */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:.9rem;display:flex;flex-direction:column;gap:.15rem;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:.85rem}
.msg-sys{text-align:center;color:var(--text3);font-size:.74rem;padding:.15rem 0;margin:.25rem 0}
.msg-day{display:flex;align-items:center;gap:.5rem;color:var(--text3);font-size:.72rem;margin:.5rem 0}
.msg-day::before,.msg-day::after{content:'';flex:1;height:1px;background:var(--border)}
.msg-group{margin-top:.55rem}
.msg-group.mine .msg-row{flex-direction:row-reverse}
.msg-group.mine .msg-bubble{background:var(--accent);color:#fff;border-radius:16px 3px 16px 16px;margin-left:auto}
.msg-group.mine .msg-meta{text-align:right;padding-right:3px}
.msg-group.same{margin-top:.1rem}
.msg-row{display:flex;align-items:flex-end;gap:.45rem}
.msg-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;flex-shrink:0;align-self:flex-end}
.msg-col{flex:1;max-width:480px;min-width:0}
.msg-meta{display:flex;align-items:baseline;gap:.35rem;font-size:.7rem;color:var(--text2);margin-bottom:.18rem;padding-left:3px}
.msg-author{font-weight:600}
.msg-time{color:var(--text3)}
.msg-bubble{background:var(--bg3);border-radius:3px 16px 16px 16px;padding:.45rem .78rem;font-size:.875rem;line-height:1.45;word-break:break-word;display:inline-block;max-width:100%;position:relative}
.msg-bubble:hover .msg-actions{opacity:1;pointer-events:auto}
.msg-actions{position:absolute;top:-28px;right:0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:.18rem .3rem;display:flex;gap:.1rem;opacity:0;transition:opacity .15s;pointer-events:none;white-space:nowrap;z-index:5}
.act-btn{background:none;border:none;cursor:pointer;font-size:.82rem;padding:.12rem .28rem;border-radius:5px;color:var(--text2);transition:background .1s}
.act-btn:hover{background:var(--bg3);color:var(--text)}
.msg-reactions{display:flex;flex-wrap:wrap;gap:.2rem;margin-top:.25rem}
.rpill{background:var(--bg4);border:1px solid var(--border);border-radius:20px;padding:.12rem .45rem;font-size:.78rem;cursor:pointer;display:flex;align-items:center;gap:.2rem;user-select:none}
.rpill:hover{background:var(--bg2)}
.rpill.mine{border-color:var(--accent)}
.rcnt{font-size:.7rem;color:var(--text2)}
.emoji-bar{display:none;gap:.2rem;padding:.35rem .6rem;background:var(--bg2);border-top:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.emoji-bar.open{display:flex}
.e-btn{background:none;border:none;cursor:pointer;font-size:1.2rem;padding:.18rem .28rem;border-radius:6px;transition:background .1s,transform .1s;flex-shrink:0}
.e-btn:hover{background:var(--bg3);transform:scale(1.15)}
.esep{width:1px;background:var(--border);flex-shrink:0;margin:.05rem .12rem}
.typing-bar{height:22px;padding:0 .9rem;display:flex;align-items:center;font-size:.74rem;color:var(--text3);flex-shrink:0}
.tdots span{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--text3);margin:0 1px;animation:td .9s ease-in-out infinite}
.tdots span:nth-child(2){animation-delay:.15s}
.tdots span:nth-child(3){animation-delay:.3s}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.input-area{border-top:1px solid var(--border);padding:.55rem .65rem;display:flex;align-items:flex-end;gap:.4rem;flex-shrink:0}
#msg-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:11px;padding:.5rem .8rem;color:var(--text);font-size:.875rem;font-family:inherit;resize:none;outline:none;transition:border-color .15s;max-height:110px;overflow-y:auto;line-height:1.45}
#msg-input:focus{border-color:var(--border2)}
#msg-input::placeholder{color:var(--text3)}
#btn-send{width:34px;height:34px;flex-shrink:0;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:background .15s,opacity .15s;align-self:flex-end}
#btn-send:hover{background:var(--accent2)}
#btn-send:disabled{opacity:.35;cursor:default}
#btn-emo{width:34px;height:34px;flex-shrink:0;border:none;border-radius:8px;background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:background .15s;align-self:flex-end}
#btn-emo:hover{background:var(--bg4)}
#btn-emo.active{background:var(--bg4);color:var(--text)}
.toast{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:.45rem 1rem;font-size:.82rem;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:540px){.sidebar{width:160px}}
@media(max-width:420px){.sidebar{display:none}}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-box">
    <div class="logo">
      <div class="logo-mark">💬</div>
      <h1>Voice<span>Chat</span></h1>
      <p>Голос + текст для своих</p>
    </div>
    <div class="card">
      <label>Твоё имя</label>
      <input id="inp-name" type="text" placeholder="Как тебя зовут?" maxlength="30" autocomplete="off"/>
      <label>Комната</label>
      <input id="inp-room" type="text" placeholder="Название" maxlength="40" autocomplete="off"/>
      <button class="btn-primary" onclick="doJoin()">Войти →</button>
      <div class="err" id="err"></div>
      <div id="rooms-section">
        <div class="divider">активные комнаты</div>
        <div class="room-list" id="room-list"><div class="hint">Загрузка...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-room">Комната: <span id="tb-rname"></span></div>
    <div class="tb-members"><div class="tb-dot"></div><span id="tb-cnt"></span></div>
    <div class="tb-actions">
      <button class="tb-btn" onclick="copyInvite()">Пригласить</button>
      <button class="tb-btn" onclick="doLeave()">Выйти</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-head">Участники</div>
      <div class="participants" id="ptab"></div>
      <div class="controls">
        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-mic" onclick="togMic()" title="Микрофон [M]">🎤</button>
          <button class="ctrl-btn" id="btn-leave" onclick="doLeave()">✕</button>
        </div>
        <div class="vol-row">🔊
          <input type="range" min="0" max="200" value="100" id="vol" oninput="setVol(this.value)">
          <span id="vol-v">100%</span>
        </div>
      </div>
    </div>
    <div class="chat">
      <div class="messages" id="msgs"></div>
      <div class="typing-bar" id="tbar"></div>
      <div class="emoji-bar" id="ebar">
        <button class="e-btn" onclick="ins('👍')">👍</button>
        <button class="e-btn" onclick="ins('❤️')">❤️</button>
        <button class="e-btn" onclick="ins('😂')">😂</button>
        <button class="e-btn" onclick="ins('🔥')">🔥</button>
        <button class="e-btn" onclick="ins('😮')">😮</button>
        <button class="e-btn" onclick="ins('😢')">😢</button>
        <button class="e-btn" onclick="ins('🤔')">🤔</button>
        <button class="e-btn" onclick="ins('💯')">💯</button>
        <div class="esep"></div>
        <button class="e-btn" onclick="ins('✅')">✅</button>
        <button class="e-btn" onclick="ins('🎮')">🎮</button>
        <button class="e-btn" onclick="ins('🍺')">🍺</button>
        <button class="e-btn" onclick="ins('🚀')">🚀</button>
        <button class="e-btn" onclick="ins('💀')">💀</button>
        <button class="e-btn" onclick="ins('⚡')">⚡</button>
        <button class="e-btn" onclick="ins('🤝')">🤝</button>
        <button class="e-btn" onclick="ins('👀')">👀</button>
      </div>
      <div class="input-area">
        <button id="btn-emo" onclick="togEmoji()">😊</button>
        <textarea id="msg-input" rows="1" placeholder="Сообщение… (Enter — отправить)"
          oninput="onTyp()" onkeydown="onKey(event)"></textarea>
        <button id="btn-send" onclick="doSend()" disabled>➤</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="t"></div>

<script>
const {Room, RoomEvent, Track} = LivekitClient;

let room=null, myName='', myRoom='', muted=false, vol=1;
let tyTimer=null, tyUsers=new Set(), tyTOs={};
let msgId=0, msgs=[], lastAuthor='', lastDay='';
let emojiOpen=false;

const COLORS=['#5b6af0','#3ecf8e','#f0b429','#e05555','#9b72f5','#34d399','#fb923c','#60a5fa','#f472b6'];
const cmap={};
const col=n=>{if(!cmap[n]){let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))&0x7fffffff;cmap[n]=COLORS[h%COLORS.length]}return cmap[n]};
const ini=n=>n.split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
const pl=(n,a,b,c)=>{const m=n%10,h=n%100;return m===1&&h!==11?a:m>=2&&m<=4&&(h<10||h>=20)?b:c};

// ── Lobby ────────────────────────────────────────────────────
async function loadRooms(){
  const section=document.getElementById('rooms-section');
  const list=document.getElementById('room-list');
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),3000);
  try{
    const r=await fetch('/api/rooms',{signal:ctrl.signal});
    clearTimeout(tid);
    const data=await r.json();
    if(data.length){
      list.innerHTML='';
      data.forEach(r=>{
        const btn=document.createElement('div');
        btn.className='room-pill';
        btn.onclick=()=>qJoin(r);
        const dot=document.createElement('div'); dot.className='live-dot';
        btn.appendChild(dot);
        btn.appendChild(document.createTextNode(r));
        list.appendChild(btn);
      });
    } else {
      list.innerHTML='<div class="hint">Нет активных комнат</div>';
    }
  }catch{
    clearTimeout(tid);
    if(section) section.style.display='none';
  }
}

function qJoin(r){
  document.getElementById('inp-room').value=r;
  if(document.getElementById('inp-name').value.trim()) doJoin();
  else document.getElementById('inp-name').focus();
}

function parseUrl(){
  const p=new URLSearchParams(location.search);
  if(p.get('room')) document.getElementById('inp-room').value=p.get('room');
  if(p.get('name')) document.getElementById('inp-name').value=p.get('name');
  if(p.get('room')&&p.get('name')) doJoin();
}

async function doJoin(){
  const name=document.getElementById('inp-name').value.trim();
  const roomN=document.getElementById('inp-room').value.trim();
  const err=document.getElementById('err');
  err.style.display='none';
  if(!name){err.textContent='Введи имя';err.style.display='block';return}
  if(!roomN){err.textContent='Введи название комнаты';err.style.display='block';return}
  try{
    const r=await fetch('/api/token',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({room:roomN,username:name})
    });
    const d=await r.json();
    if(!r.ok){err.textContent=d.error||'Ошибка сервера';err.style.display='block';return}
    await fetch('/api/rooms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:roomN})});
    myName=name; myRoom=roomN;
    await connect(d.token);
  }catch{
    err.textContent='Нет соединения с сервером';err.style.display='block';
  }
}

// ── Connect ──────────────────────────────────────────────────
async function connect(token){
  let wsUrl;
  try {
    const cr = await fetch('/api/config');
    const cd = await cr.json();
    wsUrl = cd.livekit_url;
  } catch {
    wsUrl = `ws://${location.hostname}:7880`;
  }
  room=new Room({
    adaptiveStream:true,dynacast:true,
    audioCaptureDefaults:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
  });
  room.on(RoomEvent.ParticipantConnected,    p=>{sysMsg(`${p.identity} вошёл в комнату`);renderP()});
  room.on(RoomEvent.ParticipantDisconnected, p=>{sysMsg(`${p.identity} покинул комнату`);clrTyp(p.identity);renderP()});
  room.on(RoomEvent.TrackSubscribed,         (t)=>{if(t.kind===Track.Kind.Audio)attAudio(t);renderP()});
  room.on(RoomEvent.TrackMuted,              ()=>renderP());
  room.on(RoomEvent.TrackUnmuted,            ()=>renderP());
  room.on(RoomEvent.ActiveSpeakersChanged,   s=>updSpeak(s));
  room.on(RoomEvent.DataReceived,            (d,p)=>onData(d,p));
  room.on(RoomEvent.Disconnected,            ()=>onDisc());
  await room.connect(wsUrl,token);
  await room.localParticipant.setMicrophoneEnabled(true);
  document.getElementById('lobby').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('tb-rname').textContent=myRoom;
  renderP();
  sysMsg(`Вы вошли в комнату «${myRoom}»`);
  document.getElementById('msg-input').focus();
}

// ── Participants ─────────────────────────────────────────────
function renderP(){
  if(!room)return;
  const all=[room.localParticipant,...room.remoteParticipants.values()];
  document.getElementById('tb-cnt').textContent=`${all.length} ${pl(all.length,'человек','человека','человек')}`;
  const el=document.getElementById('ptab'); el.innerHTML='';
  all.forEach(p=>{
    const isMe=p===room.localParticipant;
    const isMut=[...p.trackPublications.values()].some(pub=>pub.kind===Track.Kind.Audio&&pub.isMuted);
    const c=col(p.identity);
    const div=document.createElement('div'); div.className='participant'; div.id=`pp-${p.sid}`;
    const avatar=document.createElement('div');
    avatar.className='p-avatar'; avatar.style.cssText=`background:${c}22;color:${c}`;
    avatar.appendChild(document.createTextNode(ini(p.identity)));
    const mic=document.createElement('div'); mic.className=`p-mic ${isMut?'off':'on'}`;
    mic.textContent=isMut?'🔇':'🎤'; avatar.appendChild(mic);
    const pname=document.createElement('div'); pname.className='p-name';
    pname.textContent=p.identity;
    div.appendChild(avatar); div.appendChild(pname);
    if(isMe){const you=document.createElement('div');you.className='p-you';you.textContent='ты';div.appendChild(you);}
    el.appendChild(div);
  });
}

function attAudio(track){
  const el=track.attach(); el.volume=vol; el.autoplay=true; document.body.appendChild(el);
}

function updSpeak(speakers){
  document.querySelectorAll('.p-avatar').forEach(el=>el.classList.remove('speaking'));
  speakers.forEach(p=>{const c=document.querySelector(`#pp-${p.sid} .p-avatar`);if(c)c.classList.add('speaking')});
}

async function togMic(){
  if(!room)return; muted=!muted;
  await room.localParticipant.setMicrophoneEnabled(!muted);
  const b=document.getElementById('btn-mic');
  b.classList.toggle('muted',muted); b.textContent=muted?'🔇':'🎤';
  renderP();
}

function setVol(v){
  vol=v/100;
  document.getElementById('vol-v').textContent=Math.round(v)+'%';
  document.querySelectorAll('audio').forEach(a=>a.volume=vol);
}

async function doLeave(){ if(room) await room.disconnect(); }

function onDisc(){
  room=null;
  document.getElementById('app').style.display='none';
  document.getElementById('lobby').style.display='flex';
  document.getElementById('msgs').innerHTML='';
  msgs=[]; lastAuthor=''; lastDay='';
  document.querySelectorAll('audio').forEach(a=>a.remove());
  loadRooms();
}

// ── DataChannel ──────────────────────────────────────────────
const T={CHAT:'chat',REACT:'react',TYP:'typing',STOPTYP:'stop_typing'};

function sendD(obj){
  if(!room)return;
  room.localParticipant.publishData(new TextEncoder().encode(JSON.stringify(obj)),{reliable:true});
}

function onData(raw,participant){
  let obj; try{obj=JSON.parse(new TextDecoder().decode(raw))}catch{return}
  const sender=participant?.identity||'?';
  if(obj.type===T.CHAT)    addMsg({id:obj.id,author:sender,text:obj.text,time:obj.time||Date.now(),mine:false});
  if(obj.type===T.REACT)   applyReact(obj.msgId,obj.emoji,sender);
  if(obj.type===T.TYP)     showTyp(sender);
  if(obj.type===T.STOPTYP) clrTyp(sender);
}

// ── Chat ─────────────────────────────────────────────────────
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend()} }

function onTyp(){
  const inp=document.getElementById('msg-input');
  inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,110)+'px';
  document.getElementById('btn-send').disabled=!inp.value.trim();
  sendD({type:T.TYP}); clearTimeout(tyTimer);
  tyTimer=setTimeout(()=>sendD({type:T.STOPTYP}),2000);
}

function doSend(){
  const inp=document.getElementById('msg-input'); const text=inp.value.trim();
  if(!text||!room)return;
  const id=(++msgId)+'_'+Date.now(), time=Date.now();
  sendD({type:T.CHAT,id,text,time});
  addMsg({id,author:myName,text,time,mine:true});
  inp.value=''; inp.style.height='auto';
  document.getElementById('btn-send').disabled=true;
  sendD({type:T.STOPTYP}); clearTimeout(tyTimer);
}

const QR=['👍','❤️','😂','🔥','😮'];

function dayMark(){
  const today=new Date().toLocaleDateString('ru',{day:'numeric',month:'long'});
  if(today===lastDay)return; lastDay=today;
  const d=document.createElement('div'); d.className='msg-day'; d.textContent=today;
  document.getElementById('msgs').appendChild(d);
}

function sysMsg(t){
  const d=document.createElement('div'); d.className='msg-sys'; d.textContent=t;
  document.getElementById('msgs').appendChild(d); scrollB();
}

function addMsg({id,author,text,time,mine}){
  dayMark();
  msgs.push({id,author,text,time,mine,reactions:{}});
  const same=author===lastAuthor; lastAuthor=author;
  const c=col(author);
  const ts=new Date(time).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  const g=document.createElement('div');
  g.className=`msg-group${mine?' mine':''}${same?' same':''}`;
  g.dataset.msgId=id;
  const row=document.createElement('div'); row.className='msg-row';
  if(!mine){
    const av=document.createElement('div'); av.className='msg-avatar';
    av.style.cssText=`background:${c}22;color:${c}`;
    if(!same) av.textContent=ini(author);
    row.appendChild(av);
  }
  const col2=document.createElement('div'); col2.className='msg-col';
  if(!same){
    const meta=document.createElement('div'); meta.className='msg-meta';
    const span1=document.createElement('span'); span1.className='msg-author';
    span1.style.color=c; span1.textContent=mine?'Ты':author;
    const span2=document.createElement('span'); span2.className='msg-time';
    span2.textContent=ts;
    meta.appendChild(span1); meta.appendChild(span2); col2.appendChild(meta);
  }
  const bubble=document.createElement('div'); bubble.className='msg-bubble';
  const actions=document.createElement('div'); actions.className='msg-actions';
  QR.forEach(e=>{
    const btn=document.createElement('button'); btn.className='act-btn';
    btn.textContent=e; btn.onclick=()=>qReact(id,e); actions.appendChild(btn);
  });
  bubble.appendChild(actions);
  const textNode=document.createElement('span');
  textNode.innerHTML=esc(text);
  bubble.appendChild(textNode);
  const reacts=document.createElement('div'); reacts.className='msg-reactions'; reacts.id=`rr-${id}`;
  col2.appendChild(bubble); col2.appendChild(reacts);
  row.appendChild(col2); g.appendChild(row);
  document.getElementById('msgs').appendChild(g); scrollB();
}

function qReact(msgId,emoji){
  applyReact(msgId,emoji,myName);
  sendD({type:T.REACT,msgId,emoji});
}

function applyReact(msgId,emoji,from){
  const m=msgs.find(x=>x.id===msgId); if(!m)return;
  if(!m.reactions[emoji])m.reactions[emoji]=new Set();
  const s=m.reactions[emoji]; s.has(from)?s.delete(from):s.add(from);
  const el=document.getElementById(`rr-${msgId}`); if(!el)return;
  el.innerHTML='';
  for(const[e,s2]of Object.entries(m.reactions)){
    if(!s2.size)continue;
    const mine=s2.has(myName);
    const p=document.createElement('div'); p.className=`rpill${mine?' mine':''}`;
    p.innerHTML=`${e}<span class="rcnt">${s2.size}</span>`;
    p.onclick=()=>qReact(msgId,e); el.appendChild(p);
  }
}

function showTyp(name){
  tyUsers.add(name); clearTimeout(tyTOs[name]);
  tyTOs[name]=setTimeout(()=>clrTyp(name),4000); rndTyp();
}
function clrTyp(name){ tyUsers.delete(name); delete tyTOs[name]; rndTyp(); }
function rndTyp(){
  const bar=document.getElementById('tbar');
  if(!tyUsers.size){bar.innerHTML='';return}
  bar.textContent='';
  const span=document.createElement('span'); span.style.marginRight='.35rem';
  span.textContent=[...tyUsers].join(', ')+' печатает';
  const dots=document.createElement('span'); dots.className='tdots';
  dots.innerHTML='<span></span><span></span><span></span>';
  bar.appendChild(span); bar.appendChild(dots);
}

function togEmoji(){
  emojiOpen=!emojiOpen;
  document.getElementById('ebar').classList.toggle('open',emojiOpen);
  document.getElementById('btn-emo').classList.toggle('active',emojiOpen);
}
function ins(e){
  const inp=document.getElementById('msg-input'); const pos=inp.selectionStart;
  inp.value=inp.value.slice(0,pos)+e+inp.value.slice(inp.selectionEnd);
  inp.selectionStart=inp.selectionEnd=pos+e.length; inp.focus(); onTyp();
}

function scrollB(){
  const el=document.getElementById('msgs');
  if(el.scrollHeight-el.scrollTop-el.clientHeight<100) el.scrollTop=el.scrollHeight;
}

let toastT;
function toast(m){
  const el=document.getElementById('t'); el.textContent=m; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2200);
}

function copyInvite(){
  navigator.clipboard.writeText(`${location.origin}?room=${encodeURIComponent(myRoom)}`).then(()=>toast('Ссылка скопирована!'));
}

document.addEventListener('keydown',e=>{
  if(!room||e.target.tagName==='TEXTAREA')return;
  if(e.key==='m'||e.key==='M') togMic();
});

if(location.protocol==='file:'){
  document.getElementById('lobby').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('tb-rname').textContent='general';
  document.getElementById('tb-cnt').textContent='—';
  document.getElementById('ptab').innerHTML='<div style="padding:.5rem .45rem;color:var(--text3);font-size:.78rem">Нет соединения с сервером</div>';
  document.getElementById('msg-input').placeholder='Подключитесь к серверу чтобы отправлять сообщения…';
  sysMsg('Это предпросмотр UI — откройте через сервер для полной работы');
} else {
  loadRooms();
  parseUrl();
}
</script>
</body>
</html>
