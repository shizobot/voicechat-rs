<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoiceChat</title>
<script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#181b23;--bg3:#1f2330;--bg4:#262b38;--bg5:#2e3445;
  --b:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);
  --t:#e4e6f0;--t2:#7e8499;--t3:#4e5369;
  --ac:#5b6af0;--ac2:#4a58d4;
  --green:#3ecf8e;--red:#e05555;--yellow:#f0b429;--purple:#9b72f5;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t);font-size:14px;line-height:1.5}

/* ─── LOBBY ─────────────────────────────────────────────── */
#lobby{min-height:100vh;display:flex;flex-direction:column}

.lobby-header{
  display:flex;align-items:center;gap:.75rem;
  padding:.9rem 1.5rem;background:var(--bg2);border-bottom:1px solid var(--b);
}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--ac);
  display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:700}
.logo-text{font-weight:700;font-size:1rem}
.logo-text span{color:var(--ac)}

.lobby-body{display:flex;flex:1;overflow:hidden;height:calc(100vh - 50px)}

/* Channel list */
.channel-panel{
  flex:1;overflow-y:auto;padding:1.25rem 1.5rem;
  border-right:1px solid var(--b);
}
.panel-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:.75rem}
.channel-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.25rem}
.channel-card{
  background:var(--bg2);border:1px solid var(--b);border-radius:12px;
  padding:.9rem 1rem;cursor:pointer;transition:border-color .15s,background .15s;
  display:flex;align-items:center;gap:.85rem;
}
.channel-card:hover{border-color:var(--ac);background:var(--bg3)}
.channel-card.selected{border-color:var(--ac);background:var(--bg3)}
.ch-icon{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;flex-shrink:0;font-weight:700;
}
.ch-info{flex:1;min-width:0}
.ch-name{font-weight:600;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-meta{font-size:.75rem;color:var(--t2);margin-top:.15rem;display:flex;align-items:center;gap:.4rem}
.ch-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.ch-arrow{color:var(--t3);font-size:.8rem;flex-shrink:0}

.new-channel{
  border:1px dashed var(--b2);border-radius:12px;padding:.65rem 1rem;
  cursor:pointer;display:flex;align-items:center;gap:.5rem;
  color:var(--t2);font-size:.85rem;transition:border-color .15s,color .15s;
}
.new-channel:hover{border-color:var(--ac);color:var(--t)}
.new-ch-form{display:none;flex-direction:column;gap:.5rem;margin-top:.5rem}
.new-ch-form.open{display:flex}
input.inp{
  width:100%;background:var(--bg3);border:1px solid var(--b);border-radius:8px;
  padding:.55rem .8rem;color:var(--t);font-size:.875rem;outline:none;transition:border-color .15s;
}
input.inp:focus{border-color:var(--ac)}
input.inp::placeholder{color:var(--t3)}

/* Join panel */
.join-panel{
  width:320px;flex-shrink:0;
  padding:1.25rem 1.25rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto;
}

/* Avatar grid */
.av-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:.4rem}
.av-opt{
  width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:700;border:2px solid transparent;
  transition:border-color .15s,transform .1s;
}
.av-opt:hover{transform:scale(1.1)}
.av-opt.sel{border-color:var(--t)}

/* Nick input row */
.nick-row{position:relative}
.nick-status{
  position:absolute;right:.7rem;top:50%;transform:translateY(-50%);
  font-size:11px;font-weight:600;
}
.nick-status.ok{color:var(--green)}
.nick-status.err{color:var(--red)}
.nick-status.check{color:var(--yellow)}

.join-btn{
  width:100%;padding:.7rem;border:none;border-radius:9px;
  background:var(--ac);color:#fff;font-size:.9rem;font-weight:600;
  cursor:pointer;transition:background .15s,transform .1s,opacity .15s;
}
.join-btn:hover{background:var(--ac2)}
.join-btn:active{transform:scale(.98)}
.join-btn:disabled{opacity:.4;cursor:default}
.join-btn.loading{opacity:.6}

.err-msg{color:var(--red);font-size:.78rem;display:none}
.room-sel-hint{color:var(--t2);font-size:.78rem;text-align:center}

/* ─── APP ────────────────────────────────────────────────── */
#app{display:none;height:100vh;flex-direction:column}

.topbar{
  display:flex;align-items:center;gap:.65rem;
  background:var(--bg2);border-bottom:1px solid var(--b);
  padding:.5rem .9rem;flex-shrink:0;height:46px;
}
.tb-room{font-weight:600;font-size:.88rem;flex:none}
.tb-room span{color:var(--ac)}
.tb-members{display:flex;align-items:center;gap:.3rem;font-size:.75rem;color:var(--t2)}
.tb-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tb-right{margin-left:auto;display:flex;gap:.4rem;align-items:center}
.tb-btn{
  background:transparent;border:1px solid var(--b);border-radius:7px;
  color:var(--t2);font-size:.73rem;padding:.28rem .6rem;cursor:pointer;
  transition:border-color .15s,color .15s,background .15s;
}
.tb-btn:hover{border-color:var(--b2);color:var(--t)}
.tb-btn.active{background:var(--bg4);border-color:var(--b2);color:var(--t)}

.main{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{
  width:200px;flex-shrink:0;background:var(--bg2);
  border-right:1px solid var(--b);display:flex;flex-direction:column;
}
.sb-head{padding:.6rem .8rem .3rem;font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3)}
.participants{flex:1;overflow-y:auto;padding:.15rem .4rem .4rem}
.participant{display:flex;align-items:center;gap:.5rem;padding:.38rem .4rem;border-radius:7px}
.participant:hover{background:var(--bg3)}
.p-avatar{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.62rem;font-weight:700;flex-shrink:0;transition:box-shadow .2s;position:relative;
}
.p-avatar.speaking{box-shadow:0 0 0 2px var(--green)}
.p-mic{
  position:absolute;bottom:-2px;right:-2px;
  width:12px;height:12px;border-radius:50%;border:2px solid var(--bg2);
  display:flex;align-items:center;justify-content:center;font-size:5px;
}
.p-mic.on{background:var(--green)}.p-mic.off{background:var(--red)}
.p-name{font-size:.8rem;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-you{font-size:.66rem;color:var(--t3)}

.controls{border-top:1px solid var(--b);padding:.6rem .4rem}
.ctrl-row{display:flex;gap:.35rem;margin-bottom:.35rem}
.ctrl-btn{
  flex:1;height:34px;border:none;border-radius:7px;font-size:.9rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;
}
.ctrl-btn:active{transform:scale(.93)}
#btn-mic{background:var(--bg3);color:var(--t)}
#btn-mic.muted{background:var(--red);color:#fff}
#btn-leave{background:var(--red);color:#fff;flex:none;width:34px}
.vol-row{display:flex;align-items:center;gap:.4rem;font-size:.7rem;color:var(--t2);padding:0 .15rem}
input[type=range]{flex:1;accent-color:var(--ac);background:transparent;border:none;outline:none;cursor:pointer}

/* Chat */
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:.12rem;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

.msg-sys{text-align:center;color:var(--t3);font-size:.72rem;padding:.12rem 0;margin:.2rem 0}
.msg-day{display:flex;align-items:center;gap:.5rem;color:var(--t3);font-size:.7rem;margin:.4rem 0}
.msg-day::before,.msg-day::after{content:'';flex:1;height:1px;background:var(--b)}
.msg-group{margin-top:.5rem}
.msg-group.mine .msg-row{flex-direction:row-reverse}
.msg-group.mine .msg-bubble{background:var(--ac);color:#fff;border-radius:14px 3px 14px 14px;margin-left:auto}
.msg-group.mine .msg-meta{text-align:right;padding-right:3px}
.msg-group.same{margin-top:.08rem}
.msg-row{display:flex;align-items:flex-end;gap:.4rem}
.msg-av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;flex-shrink:0;align-self:flex-end}
.msg-col{flex:1;max-width:480px;min-width:0}
.msg-meta{display:flex;align-items:baseline;gap:.3rem;font-size:.68rem;color:var(--t2);margin-bottom:.15rem;padding-left:3px}
.msg-author{font-weight:600}
.msg-time{color:var(--t3)}
.msg-bubble{
  background:var(--bg3);border-radius:3px 14px 14px 14px;
  padding:.42rem .72rem;font-size:.86rem;line-height:1.42;word-break:break-word;
  display:inline-block;max-width:100%;position:relative;
}
.msg-bubble:hover .msg-acts{opacity:1;pointer-events:auto}
.msg-acts{
  position:absolute;top:-26px;right:0;background:var(--bg2);border:1px solid var(--b);
  border-radius:7px;padding:.15rem .28rem;display:flex;gap:.08rem;
  opacity:0;transition:opacity .15s;pointer-events:none;white-space:nowrap;z-index:5;
}
.act-btn{background:none;border:none;cursor:pointer;font-size:.8rem;padding:.1rem .25rem;border-radius:4px;color:var(--t2)}
.act-btn:hover{background:var(--bg3);color:var(--t)}
.msg-reactions{display:flex;flex-wrap:wrap;gap:.18rem;margin-top:.2rem}
.rpill{
  background:var(--bg4);border:1px solid var(--b);border-radius:20px;
  padding:.1rem .4rem;font-size:.76rem;cursor:pointer;display:flex;align-items:center;gap:.18rem;user-select:none;
}
.rpill:hover{background:var(--bg2)}
.rpill.mine{border-color:var(--ac)}
.rcnt{font-size:.68rem;color:var(--t2)}

/* Debug panel */
.debug-panel{
  border-top:1px solid var(--b);background:var(--bg2);
  max-height:180px;overflow-y:auto;font-family:'SF Mono','Fira Code',monospace;font-size:11px;
  display:none;flex-direction:column;
}
.debug-panel.open{display:flex}
.debug-panel::-webkit-scrollbar{width:3px}
.debug-panel::-webkit-scrollbar-thumb{background:var(--bg4)}
.debug-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:.3rem .65rem;border-bottom:1px solid var(--b);flex-shrink:0;
}
.debug-head span{font-size:.68rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}
.debug-clear{background:none;border:none;color:var(--t3);cursor:pointer;font-size:.7rem;padding:.1rem .3rem;border-radius:4px}
.debug-clear:hover{background:var(--bg3);color:var(--t)}
.debug-lines{flex:1;padding:.35rem .65rem;display:flex;flex-direction:column;gap:.1rem}
.dbg{display:flex;gap:.5rem;line-height:1.35}
.dbg .ts{color:var(--t3);flex-shrink:0}
.dbg.info .msg2{color:#60a5fa}
.dbg.warn .msg2{color:var(--yellow)}
.dbg.err  .msg2{color:var(--red)}
.dbg.ok   .msg2{color:var(--green)}
.dbg.data .msg2{color:var(--purple)}

.emoji-bar{display:none;gap:.18rem;padding:.3rem .55rem;background:var(--bg2);border-top:1px solid var(--b);overflow-x:auto;flex-shrink:0}
.emoji-bar.open{display:flex}
.e-btn{background:none;border:none;cursor:pointer;font-size:1.15rem;padding:.15rem .25rem;border-radius:5px;transition:background .1s,transform .1s;flex-shrink:0}
.e-btn:hover{background:var(--bg3);transform:scale(1.12)}
.esep{width:1px;background:var(--b);flex-shrink:0;margin:.04rem .1rem}
.typing-bar{height:20px;padding:0 .75rem;display:flex;align-items:center;font-size:.72rem;color:var(--t3);flex-shrink:0}
.tdots span{display:inline-block;width:3px;height:3px;border-radius:50%;background:var(--t3);margin:0 1px;animation:td .9s ease-in-out infinite}
.tdots span:nth-child(2){animation-delay:.15s}
.tdots span:nth-child(3){animation-delay:.3s}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.input-area{
  border-top:1px solid var(--b);padding:.5rem .6rem;
  display:flex;align-items:flex-end;gap:.38rem;flex-shrink:0;
}
#msg-input{
  flex:1;background:var(--bg3);border:1px solid var(--b);border-radius:10px;
  padding:.47rem .75rem;color:var(--t);font-size:.86rem;font-family:inherit;
  resize:none;outline:none;transition:border-color .15s;max-height:100px;overflow-y:auto;line-height:1.42;
}
#msg-input:focus{border-color:var(--b2)}
#msg-input::placeholder{color:var(--t3)}
#btn-send{
  width:32px;height:32px;flex-shrink:0;border:none;border-radius:7px;
  background:var(--ac);color:#fff;cursor:pointer;font-size:.82rem;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,opacity .15s;align-self:flex-end;
}
#btn-send:hover{background:var(--ac2)}
#btn-send:disabled{opacity:.35;cursor:default}
#btn-emo{
  width:32px;height:32px;flex-shrink:0;border:none;border-radius:7px;
  background:var(--bg3);color:var(--t2);cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;transition:background .15s;align-self:flex-end;
}
#btn-emo:hover,#btn-emo.active{background:var(--bg4)}

.toast{
  position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--bg3);border:1px solid var(--b2);border-radius:8px;
  padding:.4rem .9rem;font-size:.8rem;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:99;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:560px){.sidebar{width:150px}.join-panel{width:260px}}
@media(max-width:420px){.sidebar{display:none}.join-panel{width:100%}.channel-panel{display:none}}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <div class="lobby-header">
    <div class="logo-mark">V</div>
    <div class="logo-text">Voice<span>Chat</span></div>
  </div>
  <div class="lobby-body">

    <!-- Каналы -->
    <div class="channel-panel">
      <div class="panel-title">Каналы</div>
      <div class="channel-list" id="ch-list">
        <div style="color:var(--t3);font-size:.8rem;padding:.25rem 0">Загрузка...</div>
      </div>
      <div class="new-channel" id="btn-new-ch" onclick="toggleNewCh()">
        <span style="font-size:1rem">+</span> Создать канал
      </div>
      <div class="new-ch-form" id="new-ch-form">
        <input class="inp" id="inp-newch" placeholder="Название (только a-z, 0-9, -_)" maxlength="40" onkeydown="if(event.key==='Enter')createChannel()"/>
        <button class="join-btn" onclick="createChannel()" style="padding:.5rem">Создать</button>
      </div>
    </div>

    <!-- Join panel -->
    <div class="join-panel">
      <div class="panel-title">Мой профиль</div>

      <!-- Avatar picker -->
      <div>
        <div style="font-size:.72rem;color:var(--t2);margin-bottom:.45rem">Аватар</div>
        <div class="av-grid" id="av-grid"></div>
      </div>

      <!-- Nick -->
      <div>
        <div style="font-size:.72rem;color:var(--t2);margin-bottom:.35rem">Никнейм</div>
        <div class="nick-row">
          <input class="inp" id="inp-nick" placeholder="Ваш никнейм" maxlength="32" autocomplete="off"
            oninput="onNickInput()" style="padding-right:3rem"/>
          <span class="nick-status" id="nick-st"></span>
        </div>
      </div>

      <!-- Selected channel -->
      <div id="sel-ch-info" style="display:none">
        <div style="font-size:.72rem;color:var(--t2);margin-bottom:.3rem">Выбран канал</div>
        <div id="sel-ch-name" style="font-weight:600;font-size:.9rem;color:var(--ac)"></div>
      </div>

      <div class="room-sel-hint" id="sel-hint">← Выбери канал слева</div>

      <button class="join-btn" id="btn-join" onclick="doJoin()" disabled>Войти</button>
      <div class="err-msg" id="err"></div>
    </div>

  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-room">Канал: <span id="tb-rname"></span></div>
    <div class="tb-members"><div class="tb-dot"></div><span id="tb-cnt"></span></div>
    <div class="tb-right">
      <button class="tb-btn" id="btn-dbg" onclick="togDebug()">debug</button>
      <button class="tb-btn" onclick="copyInvite()">пригласить</button>
      <button class="tb-btn" onclick="doLeave()">выйти</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sb-head">Участники</div>
      <div class="participants" id="ptab"></div>
      <div class="controls">
        <div class="ctrl-row">
          <button class="ctrl-btn" id="btn-mic" onclick="togMic()" title="[M]">🎤</button>
          <button class="ctrl-btn" id="btn-leave" onclick="doLeave()">✕</button>
        </div>
        <div class="vol-row">🔊
          <input type="range" min="0" max="200" value="100" id="vol" oninput="setVol(this.value)">
          <span id="vol-v">100%</span>
        </div>
      </div>
    </div>
    <div class="chat">
      <div class="messages" id="msgs"></div>
      <div class="typing-bar" id="tbar"></div>
      <div class="debug-panel" id="debug-panel">
        <div class="debug-head">
          <span>Debug log</span>
          <button class="debug-clear" onclick="clearDebug()">Очистить</button>
        </div>
        <div class="debug-lines" id="debug-lines"></div>
      </div>
      <div class="emoji-bar" id="ebar">
        <button class="e-btn" onclick="ins('👍')">👍</button><button class="e-btn" onclick="ins('❤️')">❤️</button>
        <button class="e-btn" onclick="ins('😂')">😂</button><button class="e-btn" onclick="ins('🔥')">🔥</button>
        <button class="e-btn" onclick="ins('😮')">😮</button><button class="e-btn" onclick="ins('😢')">😢</button>
        <button class="e-btn" onclick="ins('🤔')">🤔</button><button class="e-btn" onclick="ins('💯')">💯</button>
        <div class="esep"></div>
        <button class="e-btn" onclick="ins('✅')">✅</button><button class="e-btn" onclick="ins('🎮')">🎮</button>
        <button class="e-btn" onclick="ins('🍺')">🍺</button><button class="e-btn" onclick="ins('🚀')">🚀</button>
        <button class="e-btn" onclick="ins('💀')">💀</button><button class="e-btn" onclick="ins('⚡')">⚡</button>
        <button class="e-btn" onclick="ins('🤝')">🤝</button><button class="e-btn" onclick="ins('👀')">👀</button>
      </div>
      <div class="input-area">
        <button id="btn-emo" onclick="togEmoji()">😊</button>
        <textarea id="msg-input" rows="1" placeholder="Сообщение… (Enter — отправить)"
          oninput="onTyp()" onkeydown="onKey(event)"></textarea>
        <button id="btn-send" onclick="doSend()" disabled>➤</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="tst"></div>

<script>
const {Room,RoomEvent,Track} = LivekitClient;

// ── Avatars ────────────────────────────────────────────────────
const AV_COLORS=[
  '#5b6af0','#3ecf8e','#f0b429','#e05555','#9b72f5','#34d399',
  '#fb923c','#60a5fa','#f472b6','#a78bfa','#2dd4bf','#facc15',
  '#f87171','#4ade80','#38bdf8','#c084fc'
];
const AV_ICONS=['🐺','🦊','🐻','🐼','🐨','🦁','🐯','🐮','🐸','🦋','🐬','🦅','🦉','🐙','🦊','🐉'];
const LS_AV='vchat_avatar', LS_NICK='vchat_nick';

let selAvatar = Math.max(0, parseInt(localStorage.getItem(LS_AV)||'0') || 0) % 16;
let selRoom   = '';
let nickTimer = null, nickOk = false;

function buildAvatarGrid(){
  const g=document.getElementById('av-grid');g.innerHTML='';
  AV_COLORS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='av-opt'+(i===selAvatar?' sel':'');
    d.style.background=c+'33';d.style.color=c;d.style.border='2px solid '+(i===selAvatar?c:'transparent');
    d.textContent=AV_ICONS[i];
    d.onclick=()=>{selAvatar=i;localStorage.setItem(LS_AV,i);buildAvatarGrid()};
    g.appendChild(d);
  });
}

function avatarEl(idx,name,size=28){
  const c=AV_COLORS[idx%16];
  const d=document.createElement('div');
  d.style.cssText=`width:${size}px;height:${size}px;border-radius:50%;background:${c}33;color:${c};display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.45)}px;font-weight:700;flex-shrink:0`;
  d.title=name;
  d.textContent=AV_ICONS[idx%16];
  return d;
}

function getAvatar(p){
  try{ const m=JSON.parse(p.metadata||'{}'); return parseInt(m.avatar)||0; }catch{ return 0; }
}

// ── Channel list ───────────────────────────────────────────────
async function loadChannels(){
  const list=document.getElementById('ch-list');
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),3000);
  try{
    const r=await fetch('/api/rooms',{signal:ctrl.signal});
    clearTimeout(tid);
    const data=await r.json();
    list.innerHTML='';
    if(!Array.isArray(data)||!data.length){
      const d=document.createElement('div');
      d.style.cssText='color:var(--t3);font-size:.8rem;padding:.25rem 0';
      d.textContent='Нет каналов — создай первый';
      list.appendChild(d);
    } else {
      data.forEach(ch=>{
        const name=ch.name||ch;
        const count=ch.count||0;
        const card=document.createElement('div');
        card.className='channel-card'+(name===selRoom?' selected':'');
        card.onclick=()=>selectChannel(name);
        const idx=name.split('').reduce((h,c)=>(h*31+c.charCodeAt(0))&0x7fffffff,0)%16;
        const c=AV_COLORS[idx];
        // [C1 fix] DOM API — no innerHTML with server data
        const icon=document.createElement('div');icon.className='ch-icon';
        icon.style.cssText=`background:${c}22;color:${c}`;
        icon.textContent=AV_ICONS[idx];
        const info=document.createElement('div');info.className='ch-info';
        const cname=document.createElement('div');cname.className='ch-name';
        cname.textContent=name;
        const cmeta=document.createElement('div');cmeta.className='ch-meta';
        if(count>0){
          const dot=document.createElement('div');dot.className='ch-dot';
          cmeta.appendChild(dot);
          cmeta.appendChild(document.createTextNode(count+' онлайн'));
        } else {
          cmeta.textContent='пусто';
        }
        const arrow=document.createElement('div');arrow.className='ch-arrow';arrow.textContent='›';
        info.appendChild(cname);info.appendChild(cmeta);
        card.appendChild(icon);card.appendChild(info);card.appendChild(arrow);
        list.appendChild(card);
      });
    }
  }catch{
    clearTimeout(tid);
    list.innerHTML='<div style="color:var(--t3);font-size:.8rem">Сервер недоступен</div>';
  }
}

function selectChannel(name){
  selRoom=name;
  document.querySelectorAll('.channel-card').forEach(el=>{
    el.classList.toggle('selected', el.querySelector('.ch-name')?.textContent===name);
  });
  document.getElementById('sel-ch-info').style.display='block';
  document.getElementById('sel-ch-name').textContent=name;
  document.getElementById('sel-hint').style.display='none';
  checkJoinReady();
  // Перепроверить ник для новой комнаты
  if(document.getElementById('inp-nick').value.trim()) checkNick();
}

function toggleNewCh(){
  const f=document.getElementById('new-ch-form');
  f.classList.toggle('open');
  if(f.classList.contains('open')) document.getElementById('inp-newch').focus();
}

async function createChannel(){
  const name=document.getElementById('inp-newch').value.trim();
  if(!name){toast('Введи название');return}
  if(!/^[a-zA-Z0-9\-_]+$/.test(name)){toast('Только a-z, 0-9, - _');return}
  try{
    const r=await fetch('/api/rooms',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
    if(r.ok){
      document.getElementById('inp-newch').value='';
      document.getElementById('new-ch-form').classList.remove('open');
      await loadChannels();
      selectChannel(name);
    } else {
      const d=await r.json();
      toast(d.error||'Ошибка');
    }
  }catch{toast('Ошибка сети')}
}

// ── Nick check ─────────────────────────────────────────────────
function onNickInput(){
  const v=document.getElementById('inp-nick').value.trim();
  document.getElementById('btn-join').disabled=true;
  nickOk=false;
  if(!v){document.getElementById('nick-st').textContent='';document.getElementById('nick-st').className='nick-status';return}
  if(v.length<2){setNickSt('мин. 2 символа','err');return}
  setNickSt('...','check');
  clearTimeout(nickTimer);
  nickTimer=setTimeout(checkNick,400);
}

let _checkNickCtrl=null;
async function checkNick(){
  const v=document.getElementById('inp-nick').value.trim();
  if(!v||!selRoom){return}
  if(_checkNickCtrl){_checkNickCtrl.abort()}
  _checkNickCtrl=new AbortController();
  try{
    const r=await fetch('/api/check-nick',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({room:selRoom,username:v}),
      signal:_checkNickCtrl.signal
    });
    const d=await r.json();
    if(d.available){
      setNickSt('свободен','ok');
      nickOk=true;
      localStorage.setItem(LS_NICK,v);
    } else {
      setNickSt('занят','err');
      nickOk=false;
    }
    checkJoinReady();
  }catch{setNickSt('','');nickOk=false}
}

function setNickSt(txt,cls){
  const el=document.getElementById('nick-st');
  el.textContent=txt;el.className='nick-status'+(cls?' '+cls:'');
}

function checkJoinReady(){
  document.getElementById('btn-join').disabled=!(nickOk&&selRoom);
}

// ── Join ────────────────────────────────────────────────────────
async function doJoin(){
  const nick=document.getElementById('inp-nick').value.trim();
  const err=document.getElementById('err');
  err.style.display='none';
  if(!nick){err.textContent='Введи никнейм';err.style.display='block';return}
  if(!selRoom){err.textContent='Выбери канал';err.style.display='block';return}
  const btn=document.getElementById('btn-join');
  btn.disabled=true;btn.classList.add('loading');btn.textContent='Подключение...';
  try{
    const r=await fetch('/api/token',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({room:selRoom,username:nick,avatar:selAvatar})
    });
    const d=await r.json();
    if(!r.ok){
      const msg=r.status===409?'Ник только что заняли — выбери другой':d.error||'Ошибка';
      if(r.status===409){setNickSt('занят','err');nickOk=false;checkJoinReady();}
      err.textContent=msg;err.style.display='block';
      btn.disabled=false;btn.classList.remove('loading');btn.textContent='Войти';return;
    }
    myName=nick;myRoom=selRoom;myAvatar=selAvatar;
    await connect(d.token);
  }catch{
    err.textContent='Нет соединения';err.style.display='block';
    btn.disabled=false;btn.classList.remove('loading');btn.textContent='Войти';
  }
}

// ── State ───────────────────────────────────────────────────────
let room=null,myName='',myRoom='',myAvatar=0;
let muted=false,vol=1;
let tyTimer=null,tyUsers=new Set(),tyTOs={};
let msgId=0,msgs=[],lastAuthor='',lastDay='';
let emojiOpen=false,debugOpen=false;

const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
const pl=(n,a,b,c)=>{const m=n%10,h=n%100;return m===1&&h!==11?a:m>=2&&m<=4&&(h<10||h>=20)?b:c};

// ── Connect ─────────────────────────────────────────────────────
async function connect(token){
  dbg('info','Получаем конфиг сервера...');
  let wsUrl;
  try{
    const cr=await fetch('/api/config');
    const cd=await cr.json();
    wsUrl=cd.livekit_url;
    dbg('ok',`LiveKit URL: ${wsUrl}`);
  }catch{
    wsUrl=`ws://${location.hostname}:7880`;
    dbg('warn',`Конфиг недоступен, fallback: ${wsUrl}`);
  }

  room=new Room({
    adaptiveStream:true,dynacast:true,
    audioCaptureDefaults:{echoCancellation:true,noiseSuppression:true,autoGainControl:true}
  });

  room.on(RoomEvent.Connected,()=>{
    dbg('ok',`Подключён к комнате "${myRoom}"`);
    sysMsg(`Вы вошли в канал «${myRoom}»`);
  });
  room.on(RoomEvent.Reconnecting,()=>dbg('warn','Переподключение...'));
  room.on(RoomEvent.Reconnected,()=>dbg('ok','Переподключение успешно'));
  room.on(RoomEvent.ParticipantConnected,p=>{
    dbg('info',`Участник: ${p.identity} вошёл`);
    sysMsg(`${p.identity} вошёл`);renderP();
  });
  room.on(RoomEvent.ParticipantDisconnected,p=>{
    dbg('info',`Участник: ${p.identity} вышел`);
    sysMsg(`${p.identity} вышел`);clrTyp(p.identity);renderP();
  });
  room.on(RoomEvent.TrackSubscribed,(t,pub,p)=>{
    dbg('data',`Track: ${t.kind} от ${p.identity}`);
    if(t.kind===Track.Kind.Audio)attAudio(t);renderP();
  });
  room.on(RoomEvent.TrackMuted,(pub,p)=>{
    dbg('info',`Muted: ${p?.identity}`);renderP();
  });
  room.on(RoomEvent.TrackUnmuted,(pub,p)=>{
    dbg('info',`Unmuted: ${p?.identity}`);renderP();
  });
  room.on(RoomEvent.ActiveSpeakersChanged,s=>{
    dbg('data',`Speaking: ${s.map(p=>p.identity).join(', ')||'никто'}`);
    updSpeak(s);
  });
  room.on(RoomEvent.DataReceived,(d,p)=>{
    const txt=new TextDecoder().decode(d);
    dbg('data',`Data от ${p?.identity}: ${txt.slice(0,60)}${txt.length>60?'...':''}`);
    onData(d,p);
  });
  room.on(RoomEvent.Disconnected,(reason)=>{
    dbg('warn',`Отключён: ${reason||'неизвестно'}`);
    onDisc();
  });

  dbg('info',`Подключаемся к ${wsUrl}...`);
  await room.connect(wsUrl,token);
  await room.localParticipant.setMicrophoneEnabled(true);
  dbg('ok','Микрофон включён');

  clearInterval(_channelsInterval);
  document.getElementById('lobby').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('tb-rname').textContent=myRoom;
  document.getElementById('msg-input').focus();
  const btn=document.getElementById('btn-join');
  btn.disabled=false;btn.classList.remove('loading');btn.textContent='Войти';
  renderP();dayMark();

  // Сообщаем при уходе
  window.addEventListener('beforeunload',notifyLeave);
}

// ── Participants ─────────────────────────────────────────────────
function renderP(){
  if(!room)return;
  const all=[room.localParticipant,...room.remoteParticipants.values()];
  document.getElementById('tb-cnt').textContent=`${all.length} ${pl(all.length,'человек','человека','человек')}`;
  const el=document.getElementById('ptab');el.innerHTML='';
  all.forEach(p=>{
    const isMe=p===room.localParticipant;
    const isMut=[...p.trackPublications.values()].some(pub=>pub.kind===Track.Kind.Audio&&pub.isMuted);
    const av=getAvatar(p);
    const div=document.createElement('div');div.className='participant';div.id=`pp-${p.sid}`;
    const avEl=avatarEl(av,p.identity,28);avEl.className='p-avatar';
    const mic=document.createElement('div');mic.className=`p-mic ${isMut?'off':'on'}`;
    mic.textContent=isMut?'🔇':'🎤';avEl.appendChild(mic);
    const pname=document.createElement('div');pname.className='p-name';pname.textContent=p.identity;
    div.appendChild(avEl);div.appendChild(pname);
    if(isMe){const y=document.createElement('div');y.className='p-you';y.textContent='ты';div.appendChild(y)}
    el.appendChild(div);
  });
}

function attAudio(track){
  const el=track.attach();el.volume=vol;el.autoplay=true;document.body.appendChild(el);
}

function updSpeak(speakers){
  document.querySelectorAll('.p-avatar').forEach(el=>el.classList.remove('speaking'));
  speakers.forEach(p=>{const c=document.querySelector(`#pp-${p.sid} .p-avatar`);if(c)c.classList.add('speaking')});
}

async function togMic(){
  if(!room)return;muted=!muted;
  await room.localParticipant.setMicrophoneEnabled(!muted);
  const b=document.getElementById('btn-mic');b.classList.toggle('muted',muted);b.textContent=muted?'🔇':'🎤';
  dbg(muted?'warn':'ok',`Микрофон ${muted?'выключен':'включён'}`);
  renderP();
}

function setVol(v){
  vol=v/100;document.getElementById('vol-v').textContent=Math.round(v)+'%';
  document.querySelectorAll('audio').forEach(a=>a.volume=vol);
}

async function notifyLeave(){
  if(!myName||!myRoom)return;
  const blob=new Blob([JSON.stringify({room:myRoom,username:myName})],{type:'application/json'});
  navigator.sendBeacon('/api/leave',blob);
}

async function doLeave(){
  notifyLeave();
  if(room)await room.disconnect();
}

function onDisc(){
  room=null;
  document.getElementById('app').style.display='none';
  document.getElementById('lobby').style.display='flex';
  msgs=[];lastAuthor='';lastDay='';
  document.getElementById('msgs').innerHTML='';
  document.getElementById('debug-lines').innerHTML='';
  document.querySelectorAll('audio').forEach(a=>a.remove());
  window.removeEventListener('beforeunload',notifyLeave);
  loadChannels();
  _channelsInterval=setInterval(loadChannels,15000);
  // Сбросить ник-статус
  nickOk=false;checkJoinReady();
  setNickSt('','');
  document.getElementById('inp-nick').value=myName;
  checkNick();
}

// ── Data ────────────────────────────────────────────────────────
const T={CHAT:'chat',REACT:'react',TYP:'typing',STOPTYP:'stop_typing'};
function sendD(obj){
  if(!room)return;
  room.localParticipant.publishData(new TextEncoder().encode(JSON.stringify(obj)),{reliable:true});
}
function onData(raw,participant){
  let obj;try{obj=JSON.parse(new TextDecoder().decode(raw))}catch{return}
  const sender=participant?.identity||'?';
  const av=participant?getAvatar(participant):0;
  if(obj.type===T.CHAT)   addMsg({id:obj.id,author:sender,text:obj.text,time:obj.time||Date.now(),mine:false,av});
  if(obj.type===T.REACT)  applyReact(obj.msgId,obj.emoji,sender);
  if(obj.type===T.TYP)    showTyp(sender);
  if(obj.type===T.STOPTYP)clrTyp(sender);
}

// ── Chat ────────────────────────────────────────────────────────
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend()}}
function onTyp(){
  const inp=document.getElementById('msg-input');
  inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px';
  document.getElementById('btn-send').disabled=!inp.value.trim();
  sendD({type:T.TYP});clearTimeout(tyTimer);
  tyTimer=setTimeout(()=>sendD({type:T.STOPTYP}),2000);
}
function doSend(){
  const inp=document.getElementById('msg-input');const text=inp.value.trim();
  if(!text||!room)return;
  const id=(++msgId)+'_'+Date.now(),time=Date.now();
  sendD({type:T.CHAT,id,text,time});
  addMsg({id,author:myName,text,time,mine:true,av:myAvatar});
  inp.value='';inp.style.height='auto';
  document.getElementById('btn-send').disabled=true;
  sendD({type:T.STOPTYP});clearTimeout(tyTimer);
}
const QR=['👍','❤️','😂','🔥','😮'];
function dayMark(){
  const today=new Date().toLocaleDateString('ru',{day:'numeric',month:'long'});
  if(today===lastDay)return;lastDay=today;
  const d=document.createElement('div');d.className='msg-day';d.textContent=today;
  document.getElementById('msgs').appendChild(d);
}
function sysMsg(t){
  const d=document.createElement('div');d.className='msg-sys';d.textContent=t;
  document.getElementById('msgs').appendChild(d);scrollB();
}
function addMsg({id,author,text,time,mine,av=0}){
  dayMark();
  msgs.push({id,author,text,time,mine,av,reactions:{}});
  const same=author===lastAuthor;lastAuthor=author;
  const ts=new Date(time).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  const g=document.createElement('div');
  g.className=`msg-group${mine?' mine':''}${same?' same':''}`;
  g.dataset.msgId=id;
  const row=document.createElement('div');row.className='msg-row';
  if(!mine){
    const avEl=avatarEl(av,author,24);
    avEl.className='msg-av';
    if(same)avEl.style.visibility='hidden';
    row.appendChild(avEl);
  }
  const col=document.createElement('div');col.className='msg-col';
  if(!same){
    const meta=document.createElement('div');meta.className='msg-meta';
    const au=document.createElement('span');au.className='msg-author';
    const c=AV_COLORS[av%16];au.style.color=c;au.textContent=mine?'Ты':author;
    const tm=document.createElement('span');tm.className='msg-time';tm.textContent=ts;
    meta.appendChild(au);meta.appendChild(tm);col.appendChild(meta);
  }
  const bubble=document.createElement('div');bubble.className='msg-bubble';
  const acts=document.createElement('div');acts.className='msg-acts';
  QR.forEach(e=>{const b=document.createElement('button');b.className='act-btn';b.textContent=e;b.onclick=()=>qReact(id,e);acts.appendChild(b)});
  bubble.appendChild(acts);
  const txt=document.createElement('span');txt.innerHTML=esc(text);bubble.appendChild(txt);
  const rr=document.createElement('div');rr.className='msg-reactions';rr.id=`rr-${id}`;
  col.appendChild(bubble);col.appendChild(rr);
  row.appendChild(col);g.appendChild(row);
  document.getElementById('msgs').appendChild(g);scrollB();
}
function qReact(msgId,emoji){applyReact(msgId,emoji,myName);sendD({type:T.REACT,msgId,emoji})}
function applyReact(msgId,emoji,from){
  const m=msgs.find(x=>x.id===msgId);if(!m)return;
  if(!m.reactions[emoji])m.reactions[emoji]=new Set();
  const s=m.reactions[emoji];s.has(from)?s.delete(from):s.add(from);
  const el=document.getElementById(`rr-${msgId}`);if(!el)return;
  el.innerHTML='';
  for(const[e,s2]of Object.entries(m.reactions)){
    if(!s2.size)continue;
    const p=document.createElement('div');p.className=`rpill${s2.has(myName)?' mine':''}`;
    p.innerHTML=`${e}<span class="rcnt">${s2.size}</span>`;
    p.onclick=()=>qReact(msgId,e);el.appendChild(p);
  }
}
function showTyp(name){tyUsers.add(name);clearTimeout(tyTOs[name]);tyTOs[name]=setTimeout(()=>clrTyp(name),4000);rndTyp()}
function clrTyp(name){tyUsers.delete(name);delete tyTOs[name];rndTyp()}
function rndTyp(){
  const bar=document.getElementById('tbar');
  if(!tyUsers.size){bar.innerHTML='';return}
  const sp=document.createElement('span');sp.style.marginRight='.3rem';sp.textContent=[...tyUsers].join(', ')+' печатает';
  const d=document.createElement('span');d.className='tdots';d.innerHTML='<span></span><span></span><span></span>';
  bar.innerHTML='';bar.appendChild(sp);bar.appendChild(d);
}

// ── Debug ───────────────────────────────────────────────────────
function togDebug(){
  debugOpen=!debugOpen;
  document.getElementById('debug-panel').classList.toggle('open',debugOpen);
  document.getElementById('btn-dbg').classList.toggle('active',debugOpen);
}
function clearDebug(){document.getElementById('debug-lines').innerHTML=''}
function dbg(level,msg){
  const lines=document.getElementById('debug-lines');
  if(!lines)return;
  const row=document.createElement('div');row.className=`dbg ${level}`;
  const ts=document.createElement('span');ts.className='ts';ts.textContent=new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const m=document.createElement('span');m.className='msg2';m.textContent=msg;
  row.appendChild(ts);row.appendChild(m);
  lines.appendChild(row);
  // Авто-скролл если panel открыта
  if(debugOpen)lines.scrollTop=lines.scrollHeight;
  // Лимит строк
  while(lines.children.length>200)lines.removeChild(lines.firstChild);
}

// ── Misc ────────────────────────────────────────────────────────
function togEmoji(){
  emojiOpen=!emojiOpen;
  document.getElementById('ebar').classList.toggle('open',emojiOpen);
  document.getElementById('btn-emo').classList.toggle('active',emojiOpen);
}
function ins(e){
  const inp=document.getElementById('msg-input');const pos=inp.selectionStart;
  inp.value=inp.value.slice(0,pos)+e+inp.value.slice(inp.selectionEnd);
  inp.selectionStart=inp.selectionEnd=pos+e.length;inp.focus();onTyp();
}
function scrollB(){
  const el=document.getElementById('msgs');
  if(el.scrollHeight-el.scrollTop-el.clientHeight<100)el.scrollTop=el.scrollHeight;
}
let toastT;
function toast(m){
  const el=document.getElementById('tst');el.textContent=m;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);
}
function copyInvite(){
  navigator.clipboard.writeText(`${location.origin}?room=${encodeURIComponent(myRoom)}`).then(()=>toast('Ссылка скопирована!'));
}

// ── URL params ───────────────────────────────────────────────────
function parseUrl(){
  const p=new URLSearchParams(location.search);
  if(p.get('room'))selectChannel(p.get('room'));
  const savedNick=localStorage.getItem(LS_NICK);
  if(savedNick)document.getElementById('inp-nick').value=savedNick;
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(!room||e.target.tagName==='TEXTAREA')return;
  if(e.key==='m'||e.key==='M')togMic();
  if(e.key==='d'||e.key==='D')togDebug();
});

// Init
buildAvatarGrid();
loadChannels();
parseUrl();
let _channelsInterval = setInterval(loadChannels,15000);
