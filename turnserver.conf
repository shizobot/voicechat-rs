# turnserver.conf — coturn для пробития Symmetric NAT
# Раскомментируй coturn в docker-compose.yml и запусти

# Внешний IP — автоопределение или укажи вручную:
# external-ip=1.2.3.4
detect-external-ip=yes

# Порты
listening-port=3478
tls-listening-port=5349

# Диапазон UDP портов для медиа (открой в файрволе!)
min-port=49152
max-port=65535

# Аутентификация через общий секрет (для LiveKit)
use-auth-secret
static-auth-secret=turn_super_secret_change_me

# Домен (можно любой)
realm=voicechat.local

# Безопасность
fingerprint
lt-cred-mech
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Логи
log-file=stdout
verbose
